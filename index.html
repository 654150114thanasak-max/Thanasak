<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanasak Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="vibrant-glow top-right"></div>
    <div class="vibrant-glow bottom-left"></div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="profile-box">
                <div class="avatar-container">
                    <img src="Images/profile.jpg" alt="Thanasak Klinmali Profile">
                </div>
                <h1 class="name">ธนศักดิ์ กลิ่นมาลี</h1>
                <p class="role">Computer Teacher & Developer</p>
            </div>

            <nav class="side-nav">
                <a href="#" class="nav-link active" data-page="home">
                    <i class="fas fa-home"></i> <span>หน้าหลัก</span>
                </a>
                <a href="#" class="nav-link" data-page="about">
                    <i class="fas fa-user-circle"></i> <span>ข้อมูลส่วนตัว</span>
                </a>
                <a href="#" class="nav-link" data-page="edu">
                    <i class="fas fa-graduation-cap"></i> <span>การศึกษา</span>
                </a>

                <a href="#" class="nav-link highlight-btn" data-page="special_project">
                    <i class="fas fa-star"></i> <span>ผลงาน</span>
                </a>

                <div class="nav-group">
                    <a href="#" class="nav-link has-sub" id="portBtn">
                        <i class="fas fa-award"></i> <span>Certificates</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </a>
                    <div class="submenu" id="portSubmenu">
                        <a href="#" class="sub-link" data-page="port1"><i class="fas fa-seedling"></i> เกษตรอัจฉริยะ</a>
                        <a href="#" class="sub-link" data-page="port2"><i class="fas fa-language"></i> CEFR</a>
                        <a href="#" class="sub-link" data-page="port3"><i class="fas fa-university"></i> PBRU</a>
                        <a href="#" class="sub-link" data-page="port4"><i class="fas fa-compass"></i> วุฒิทางลูกเสือ</a>
                        <a href="#" class="sub-link" data-page="port5"><i class="fas fa-chalkboard-teacher"></i> ฝึกประสบการณ์</a>
                    </div>
                </div>

                <a href="#" class="nav-link" data-page="contact">
                    <i class="fas fa-paper-plane"></i> <span>ติดต่อ</span>
                </a>

                <hr class="nav-divider">

                <a href="#" class="nav-link" id="downloadResume" style="color: var(--vibrant-primary); border: 1px solid var(--vibrant-primary);">
                    <i class="fas fa-file-download"></i> <span>Download Resume</span>
                </a>
            </nav>
        </aside>

        <main class="content-area">
            <div id="dynamic-content"></div>
        </main>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-close-zone" id="modalClose"><i class="fas fa-times"></i></div>
        <img class="modal-content" id="imgFull">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
